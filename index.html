<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>名鉄風LEDルーレット＋音声送信</title>
<style>
  body {
    background-color: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    color: #ff0;
  }

  .led-container {
    width: 80%;
    height: 180px;
    overflow: hidden;
    position: relative;
    border: 2px solid #ff0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    margin-bottom: 20px;
  }

  .led-type {
    font-size: 3em;
    font-weight: bold;
    padding: 5px 20px;
    margin-bottom: 5px;
    border-radius: 5px;
    min-width: 200px;
    text-align: center;
    color: black;
  }

  .led-destination {
    font-size: 2em;
    white-space: nowrap;
    position: relative;
    left: 0;
  }

  .led-announcement {
    font-size: 1.5em;
    margin-top: 10px;
    text-align: center;
  }

  button {
    font-size: 1.5em;
    padding: 10px 20px;
    background-color: #222;
    color: #ff0;
    border: 2px solid #ff0;
    cursor: pointer;
    margin: 5px;
  }

  button:hover {
    background-color: #444;
  }
</style>
</head>
<body>

<div class="led-container">
  <div class="led-type" id="ledType">種別</div>
  <div class="led-destination" id="ledDestination">行き先</div>
  <div class="led-announcement" id="ledAnnouncement">アナウンス</div>
</div>

<button id="randomButton">ランダム表示</button>
<button id="voiceButton">音声で送信</button>

<script>
  const displayData = [
    { type: "普通", destination: "名古屋", color: "#0f0", announcement: "名古屋で次第発車します" },
    { type: "快速", destination: "岐阜", color: "#00f", announcement: "岐阜で次第発車します" },
    { type: "特急", destination: "豊橋", color: "#f00", announcement: "豊橋で次第発車します" },
    { type: "急行", destination: "知多半田", color: "#ffa500", announcement: "知多半田で次第発車します" },
    { type: "臨時", destination: "豊川", color: "#ff0", announcement: "豊川で次第発車します" },
    { type: "回送", destination: "大府", color: "#aaa", announcement: "大府で次第発車します" }
  ];

  const ledType = document.getElementById("ledType");
  const ledDestination = document.getElementById("ledDestination");
  const ledAnnouncement = document.getElementById("ledAnnouncement");
  const randomButton = document.getElementById("randomButton");
  const voiceButton = document.getElementById("voiceButton");

  function startRoulette() {
    let count = 0;
    const maxCount = 100;
    const intervalTime = 30;

    const interval = setInterval(() => {
      count++;

      const randomIndex = Math.floor(Math.random() * displayData.length);
      const data = displayData[randomIndex];

      // 種別表示
      ledType.textContent = data.type;
      ledType.style.backgroundColor = data.color;

      // 行き先表示
      ledDestination.textContent = data.destination;

      // アナウンス表示
      ledAnnouncement.textContent = data.announcement;

      // 上下ループ演出
      const offset = Math.sin(count / 3) * 20;
      ledType.style.transform = `translateY(${offset}px)`;
      ledDestination.style.transform = `translateY(${offset}px)`;
      ledAnnouncement.style.transform = `translateY(${offset}px)`;

      if(count >= maxCount){
        clearInterval(interval);
        ledType.style.transform = 'translateY(0)';
        ledDestination.style.transform = 'translateY(0)';
        ledAnnouncement.style.transform = 'translateY(0)';

        // 横スクロールする行き先
        const scrollWidth = ledDestination.scrollWidth;
        const containerWidth = ledDestination.parentElement.offsetWidth;
        let pos = containerWidth;

        const scrollInterval = setInterval(() => {
          pos -= 2;
          if(pos < -scrollWidth) pos = containerWidth;
          ledDestination.style.left = pos + 'px';
        }, 30);
      }
    }, intervalTime);
  }

  // ランダム表示ボタン
  randomButton.addEventListener('click', startRoulette);

  // ページロード時に自動
  startRoulette();

  // 音声認識で送信
  voiceButton.addEventListener('click', () => {
    if (!('webkitSpeechRecognition' in window)) {
      alert('このブラウザは音声認識に対応していません');
      return;
    }

    const recognition = new webkitSpeechRecognition();
    recognition.lang = 'ja-JP';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.start();

    recognition.onresult = (event) => {
      const speechText = event.results[0][0].transcript;
      console.log('音声認識結果:', speechText);
      // 音声を認識したらルーレット開始
      startRoulette();
    };

    recognition.onerror = (event) => {
      console.error('音声認識エラー:', event.error);
    };
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>子供タイプリスト スライド表示</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f9f9f9;
    color: #333;
    margin: 0;
    overflow-x: hidden;
}

h1 {
    text-align: center;
    margin: 20px 0;
    font-size: 24px;
}

.carousel-container {
    position: relative;
    width: 90%;
    max-width: 600px;
    margin: auto;
    overflow: hidden;
}

.carousel-track {
    display: flex;
    transition: transform 1.5s ease-in-out; /* スライドゆっくり */
}

.card {
    flex: 0 0 100%;
    box-sizing: border-box;
    padding: 15px;
    text-align: center;
    background-color: #fff;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.card img {
    width: 70%;
    height: auto;
    border-radius: 10px;
    margin-bottom: 10px;
}

.card h2 {
    font-size: 20px;
    margin: 8px 0 5px 0;
}

.card p {
    font-size: 14px;
    color: #666;
}

/* スマホ用レスポンシブ */
@media (max-width: 480px) {
    h1 { font-size: 20px; }
    .card img { width: 80%; }
    .card h2 { font-size: 18px; }
    .card p { font-size: 12px; }
}
</style>
</head>
<body>

<h1>子供タイプリスト スライド</h1>

<div class="carousel-container">
    <div class="carousel-track">
        <!-- 子役1 -->
        <div class="card">
            <img src="https://media.discordapp.net/attachments/1403312014507507743/1403693173385068686/SPOILER_402883904_852476969852519_4631502010971770191_n.jpg?ex=689dc0a3&amp;is=689c6f23&amp;hm=2150d3e1451c275ef335928321047a858b98e38a7be02f650cd2d1d1ac8cad32&amp;=&amp;format=webp&amp;width=606&amp;height=644" alt="中原哲太郎">
            <h2>中原哲太郎</h2>
            <p>自己紹介：中原哲太郎です。こちらは子供タイプリストの一員です。</p>
        </div>
        <!-- 子役2 -->
        <div class="card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRp1suDPvaEBDBMVLVNud3BrfWRFeRHmqbeXg&amp" alt="渡邉 斗翔">
            <h2>渡邉 斗翔</h2>
            <p>自己紹介：渡邉 斗翔</p>
        </div>

<script>
// カルーセルスライド用
const track = document.querySelector('.carousel-track');
const cards = document.querySelectorAll('.card');
let index = 0;

function slideNext() {
    index++;
    if(index >= cards.length) index = 0;
    track.style.transform = `translateX(-${index * 100}%)`;
}

// 4秒ごとに右にゆっくりスライド
setInterval(slideNext, 4000);
</script>

</body>
</html>

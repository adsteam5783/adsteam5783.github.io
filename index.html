<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>子供タイプリスト</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            padding: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
        }

        .grid-container {
            display: flex;           /* 横並びにする */
            flex-wrap: wrap;         /* 横幅オーバーしたら折り返す */
            gap: 20px;
            justify-content: center; /* 中央寄せ */
        }

        .card {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            padding: 20px;
            width: 220px;            /* 固定幅で横並び */
            text-align: center;
        }

        .card img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .card h2 {
            margin: 10px 0 5px 0;
            color: #444;
            font-size: 18px;
        }

        .card p {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <h1>子供タイプリスト</h1>

    <div class="grid-container">
        <!-- 子供1 -->
        <div class="card">
            <img src="https://media.discordapp.net/attachments/1403312014507507743/1403693173385068686/SPOILER_402883904_852476969852519_4631502010971770191_n.jpg?ex=689dc0a3&amp;is=689c6f23&amp;hm=2150d3e1451c275ef335928321047a858b98e38a7be02f650cd2d1d1ac8cad32&amp;=&amp;format=webp&amp;width=606&amp;height=644" 
                 alt="中原哲太郎の画像">
            <h2>中原哲太郎</h2>
            <p>自己紹介：中原哲太郎です。こちらは子供タイプリストの一員です。</p>
        </div>

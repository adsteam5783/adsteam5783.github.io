<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>ADS公式 - キャンペーン & 情報部門配信</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #f0f8ff;
      margin: 0;
      padding: 20px;
      text-align: center;
      color: #333;
    }
    .container {
      max-width: 600px;
      margin: 50px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h1 {
      color: #0078D4;
      margin-bottom: 20px;
    }
    p {
      font-size: 18px;
      line-height: 1.5;
      margin: 10px 0;
    }
    .highlight {
      color: #d9534f;
      font-weight: bold;
      font-size: 20px;
    }
    .section {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #ddd;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background-color: #0078D4;
      color: white;
      font-weight: bold;
      border-radius: 5px;
      text-decoration: none;
      transition: background-color 0.3s ease;
    }
    .btn:hover {
      background-color: #005a9e;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ADS公式</h1>

    <p><span class="highlight">7月19日から夏休み期間終了まで</span><br>新メンバー加入キャンペーンを開催します！</p>
    <p>今なら特典がいっぱい！ぜひこの機会にご参加ください。</p>
    <a href="#" class="btn">キャンペーン詳細を見る</a>

    <div class="section">
      <h2>情報部門配信 開催中！</h2>
      <p>現在、情報部門による配信も実施中です。<br>
         最新の情報や役立つコンテンツをお届けしています。</p>
      <a href="#" class="btn">配信詳細を見る</a>
    </div>
  </div>
</body>
</html>

<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Google Drive MP4 自動再生（保存抑止）</title>
  <style>
    body { font-family: sans-serif; background: #f8fafc; color: #0f172a; margin: 0; padding: 20px; }
    .wrap { max-width: 800px; margin: auto; }
    h1 { font-size: 20px; }
    .video-wrap { position: relative; aspect-ratio: 16/9; background: black; }
    video { width: 100%; height: 100%; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>Google Drive MP4 自動再生</h1>
  <div class="video-wrap">
    <video id="v" autoplay muted playsinline controls controlslist="nodownload noplaybackrate" disablepictureinpicture>
      <source src="https://drive.google.com/uc?export=download&id=1-7f4NlYfBnEKK239EZvItrP1v31rZXtB" type="video/mp4">
    </video>
  </div>
</div>

<script>
  // 簡易右クリック抑止
  document.addEventListener('contextmenu', e => {
    if (e.target.closest('video')) e.preventDefault();
  });
</script>
</body>
</html>

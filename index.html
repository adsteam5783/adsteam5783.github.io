<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>動画編集依頼フォーム</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');

    body {
      font-family: 'Arial', sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px 40px;
      background: #121212;
      color: #eee;
    }
    h1, h2 {
      text-align: center;
      color: #fff;
      letter-spacing: 0.1em;
      margin-bottom: 0.5em;
    }
    form {
      background: #1e1e1e;
      padding: 25px 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
      border: 1px solid #00ffff;
      transition: opacity 0.3s ease;
    }
    label {
      display: block;
      margin-top: 20px;
      font-weight: 700;
      font-size: 1rem;
      color: #00ffff;
      letter-spacing: 0.05em;
    }
    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: none;
      border-radius: 6px;
      background: #333;
      color: #eee;
      font-size: 1rem;
      box-sizing: border-box;
      transition: box-shadow 0.3s ease;
    }
    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus {
      outline: none;
      box-shadow: 0 0 8px #00ffff;
      background: #222;
    }
    textarea {
      resize: vertical;
      height: 120px;
    }
    button {
      margin-top: 30px;
      background: linear-gradient(45deg, #00ffff, #0077ff);
      color: #121212;
      border: none;
      padding: 15px 25px;
      font-size: 1.2rem;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      letter-spacing: 0.1em;
      box-shadow: 0 0 15px #00ffff;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }
    button:hover {
      background: linear-gradient(45deg, #0077ff, #00ffff);
      box-shadow: 0 0 25px #00ffff;
      color: white;
    }
    /* キャッチコピー */
    .catchphrase {
      font-family: 'Anton', sans-serif;
      font-size: 2.5rem;
      text-align: center;
      margin: 40px 0 30px 0;
      background: linear-gradient(90deg, #00ffff, #0077ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glow 2.5s ease-in-out infinite alternate;
      letter-spacing: 0.2em;
      user-select: none;
    }
    @keyframes glow {
      0% {
        text-shadow:
          0 0 5px #00ffff,
          0 0 10px #00ffff,
          0 0 20px #00ffff,
          0 0 40px #0077ff,
          0 0 80px #0077ff;
      }
      100% {
        text-shadow:
          0 0 10px #00ffff,
          0 0 20px #00ffff,
          0 0 30px #00ffff,
          0 0 50px #0077ff,
          0 0 100px #0077ff;
      }
    }
    /* レビューセクション */
    .review-section {
      background: #1e1e1e;
      border: 2px solid #00ffff;
      padding: 25px 30px;
      margin-top: 50px;
      border-radius: 10px;
      box-shadow: 0 0 10px #00ffff;
      color: #cceeff;
    }
    .review-section h2 {
      color: #00ffff;
      letter-spacing: 0.1em;
      margin-bottom: 15px;
    }
    .review-section blockquote {
      font-size: 1.3rem;
      font-style: italic;
      color: #99ddff;
      margin: 0 0 15px 0;
      border-left: 4px solid #00ffff;
      padding-left: 15px;
    }
    .review-section p {
      text-align: right;
      font-weight: 700;
      color: #00cccc;
      margin: 0;
      font-size: 1.1rem;
    }
    /* 送信完了メッセージ */
    #thanksMessage {
      display: none;
      text-align: center;
      margin-top: 30px;
      color: #00ffff;
      font-weight: 700;
      font-size: 1.3rem;
      user-select: none;
      animation: fadeIn 0.8s ease forwards;
    }
    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
  </style>
</head>
<body>
  <h1>動画編集依頼フォーム</h1>
  
  <div class="catchphrase">最高の仕上げにいたします</div>

  <form id="requestForm" novalidate>
    <label for="name">お名前</label>
    <input type="text" id="name" name="name" required />

    <label for="email">メールアドレス</label>
    <input type="email" id="email" name="email" required />

    <label for="details">動画編集の内容・希望</label>
    <textarea id="details" name="details" placeholder="どんな編集を希望していますか？" required></textarea>

    <button type="submit">送信する</button>
  </form>

  <div id="thanksMessage">送信ありがとうございました！</div>

  <section class="review-section">
    <h2>お客様の声</h2>
    <blockquote>神編集これからもたのみたい</blockquote>
    <p>— 依頼者 レモンボット様</p>
  </section>

  <script>
    const form = document.getElementById('requestForm');
    const thanks = document.getElementById('thanksMessage');

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }
      form.style.display = 'none';
      thanks.style.display = 'block';
    });
  </script>
</body>
</html>

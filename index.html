<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ただいま準備中です</title>
  <style>
    body {
      font-family: 'Helvetica Neue', sans-serif;
      background-color: #f5f5f5;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .container {
      background-color: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 2em;
      margin-bottom: 20px;
    }
    p {
      font-size: 1.1em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ただいまサイトを準備中です</h1>
    <p>現在、新しいサイトの公開に向けて準備を進めております。<br>
    ドメイン申請などにお時間をいただいております。<br>
    ご不便をおかけして申し訳ありませんが、今しばらくお待ちください。</p>
  </div>
</body>
</html>

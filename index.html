
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>プロフィールサイト - toy</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@700&family=Montserrat&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Montserrat', sans-serif;
      color: #eee;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .profile-container {
      display: flex;
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      max-width: 800px;
      width: 90%;
      align-items: center;
    }

    .profile-text {
      flex: 1;
      padding-right: 30px;
    }

    .profile-text h1 {
      font-family: 'Roboto Slab', serif;
      font-weight: 700;
      font-size: 2.2rem;
      margin-bottom: 15px;
      letter-spacing: 2px;
      text-shadow: 0 0 10px #00ffd5;
    }

    .profile-text p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #a0e9e0;
    }

    .profile-img img {
      width: 220px;
      height: 220px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid #00ffd5;
      box-shadow: 0 0 15px #00ffd5;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .profile-img img:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px #00ffd5;
    }

    @media (max-width: 700px) {
      .profile-container {
        flex-direction: column;
        text-align: center;
      }
      .profile-text {
        padding-right: 0;
        margin-bottom: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="profile-container">
    <div class="profile-text">
      <h1>toy, 中原哲太郎</h1>
      <p>
        年齢：非公開<br>
        趣味：ゲーム、プログラミング、音楽<br>
        所属事務所：クラージュキッズ
      </p>
    </div>
    <div class="profile-img">
      <img src="https://media.discordapp.net/attachments/1403312014507507743/1403693173385068686/SPOILER_402883904_852476969852519_4631502010971770191_n.jpg?ex=689d17e3&amp;is=689bc663&amp;hm=afb847d9a9f1874b9e1ca838a226474a42cdaea13f26e29e217c25f61786425a&amp;=&amp;format=webp&amp;width=606&amp;height=644" alt="toyの顔写真" />
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>🎬 オンラインToyシネマ | 上映案内</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #1e1e1e;
      color: #fff;
      margin: 0;
      padding: 0;
    }
    .center-message {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 60vh;
      text-align: center;
      flex-direction: column;
    }
    .center-message h1 {
      font-size: 48px;
      color: #ffd700;
      margin: 0;
    }
    .sub-text {
      margin-top: 20px;
      font-size: 20px;
      color: #ccc;
    }
    .schedule {
      margin-top: 40px;
      text-align: center;
    }
    .schedule h2 {
      color: #00ffff;
      font-size: 28px;
      margin-bottom: 10px;
    }
    .schedule ul {
      list-style: none;
      padding: 0;
      font-size: 18px;
      color: #fff;
    }
    .schedule li {
      margin: 10px 0;
    }
    .note {
      margin-top: 20px;
      font-size: 16px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="center-message">
    <h1>🎬 Toyシネマ スケジュール調整中</h1>
    <div class="sub-text">上映再開までしばらくお待ちください。</div>
  </div>

  <div class="schedule">
    <h2>📅 本日 7月27日 上映予定</h2>
    <ul>
      <li>🕣 18:40　🎤『すとぷり 始まりの物語』</li>
      <li>🕣 18:50〜22:00　🎮『マイクロソフト・ザ・ムービー』</li>
    </ul>
    <div class="note">🎟 リクエストがあった場合は、順次追加予定です。</div>
  </div>

  <script>
    const today = new Date();
    const options = { month: 'numeric', day: 'numeric' };
    const formattedDate = today.toLocaleDateString('ja-JP', options);
    document.querySelector('.schedule h2').textContent = `📅 本日 ${formattedDate} 上映予定`;
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEDルーレット表示</title>
<style>
  body {
    background-color: black;
    color: #0f0;
    font-family: 'Courier New', monospace;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    height: 100vh;
    margin: 0;
    overflow: hidden;
  }

  .led-container {
    width: 100%;
    overflow: hidden;
    height: 50px;
    position: relative;
  }

  .led-display {
    position: absolute;
    width: 100%;
    text-align: center;
    font-size: 2em;
    letter-spacing: 0.1em;
    color: #0f0;
  }

  @keyframes scrollDown {
    0% { top: -50px; }
    100% { top: 0; }
  }
</style>
</head>
<body>

<div class="led-container" id="ledContainer">
  <div class="led-display" id="ledDisplay">種別: 普通 / 行き先: 東京</div>
</div>

<script>
  const displayData = [
    { type: "普通", destination: "東京" },
    { type: "快速", destination: "大阪" },
    { type: "特急", destination: "名古屋" },
    { type: "急行", destination: "横浜" },
    { type: "臨時", destination: "札幌" },
    { type: "回送", destination: "博多" }
  ];

  // ランダムに選ぶ
  const randomIndex = Math.floor(Math.random() * displayData.length);
  const data = displayData[randomIndex];

  const ledDisplay = document.getElementById("ledDisplay");
  ledDisplay.textContent = `種別: ${data.type} / 行き先: ${data.destination}`;

  // スクロールアニメーション
  ledDisplay.style.animation = 'scrollDown 1s ease-out forwards';
</script>

</body>
</html>

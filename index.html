<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>子供タイプリスト</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            padding: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: auto;
        }

        .card {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            padding: 20px;
            text-align: center;
        }

        .card img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .card h2 {
            margin: 10px 0 5px 0;
            color: #444;
            font-size: 18px;
        }

        .card p {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <h1>子供タイプリスト</h1>

    <div class="grid-container">
        <!-- 子役1 -->
        <div class="card">
            <img src="子役1の画像URL" alt="子役1の画像">
            <h2>子役1</h2>
            <p>自己紹介：子役1です。</p>
        </div>

        <!-- こやく1 -->
        <div class="card">
            <img src="こやく1の画像URL" alt="こやく1の画像">
            <h2>こやく1</h2>
            <p>自己紹介：こやく1です。</p>
        </div>

        <!-- こやく2 -->
        <div class="card">
            <img src="こやく2の画像URL" alt="こやく2の画像">
            <h2>こやく2</h2>
            <p>自己紹介：こやく2です。</p>
        </div>

        <!-- # ここに新しい子役やこやくを追加 -->
        <!--
        <div class="card">
            <img src="新しい子供の画像URL" alt="新しい子供の画像">
            <h2>新しい子供の名前</h2>
            <p>自己紹介：ここに自己紹介を書きます。</p>
        </div>
        -->
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ネット指名手配一覧</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 {
      margin-bottom: 10px;
      color: #e74c3c;
      text-shadow: 0 0 10px #e74c3c;
    }
    header {
      margin-bottom: 30px;
    }
    header img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 3px solid #e74c3c;
      box-shadow: 0 0 15px #e74c3c;
      object-fit: cover;
    }
    input[type="text"] {
      padding: 10px;
      width: 300px;
      border-radius: 6px;
      border: none;
      font-size: 16px;
      margin-bottom: 30px;
      outline: none;
      box-shadow: 0 0 10px #e74c3c;
      background: #222;
      color: #eee;
    }
    .wanted-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      max-width: 960px;
      margin: 0 auto;
    }
    .wanted-card {
      background: #222;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 0 15px #e74c3c;
      transition: transform 0.2s;
      cursor: pointer;
    }
    .wanted-card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px #e74c3c;
    }
    .wanted-photo {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 10px;
      border: 3px solid #e74c3c;
    }
    .wanted-name {
      font-size: 1.4rem;
      font-weight: bold;
      margin-bottom: 6px;
      color: #e74c3c;
    }
    .wanted-desc {
      font-size: 1rem;
      line-height: 1.3;
      color: #ccc;
      min-height: 60px;
    }
  </style>
</head>
<body>

<header>
  <img src="https://media.discordapp.net/attachments/1403312014507507743/1403693173385068686/SPOILER_402883904_852476969852519_4631502010971770191_n.jpg?ex=68987aa3&amp;is=68972923&amp;hm=ecb2c95f4254968eb7862ad2d94787620856f364ac7f68d64dd21cc8b8cffb07&amp;=&amp;format=webp&amp;width=606&amp;height=644" alt="追加画像" />
  <h1>ネット指名手配一覧</h1>
</header>

<input type="text" id="searchInput" placeholder="名前で検索" />

<div class="wanted-list" id="wantedList">
  <!-- カードはJSで生成 -->
</div>

<script>
  const wantedPeople = [
    {
      name: "山田 太郎",
      photo: "https://randomuser.me/api/portraits/men/11.jpg",
      description: "詐欺事件に関与。顔写真は典型的な日本人男性。注意してください。"
    },
    {
      name: "佐藤 花子",
      photo: "https://randomuser.me/api/portraits/women/22.jpg",
      description: "重要参考人。複数の事件に関わった疑いあり。"
    },
    {
      name: "鈴木 一郎",
      photo: "https://randomuser.me/api/portraits/men/33.jpg",
      description: "詐欺グループのリーダーと疑われています。"
    },
    {
      name: "田中 美咲",
      photo: "https://randomuser.me/api/portraits/women/44.jpg",
      description: "詐欺の共犯者として捜査中。情報提供求む。"
    }
  ];

  const wantedList = document.getElementById('wantedList');
  const searchInput = document.getElementById('searchInput');

  function renderList(filter = '') {
    wantedList.innerHTML = '';
    const filtered = wantedPeople.filter(p => p.name.includes(filter));
    if(filtered.length === 0) {
      wantedList.innerHTML = '<p>該当する人物がいません。</p>';
      return;
    }
    filtered.forEach(person => {
      const card = document.createElement('div');
      card.className = 'wanted-card';
      card.innerHTML = `
        <img class="wanted-photo" src="${person.photo}" alt="${person.name}" />
        <div class="wanted-name">${person.name}</div>
        <div class="wanted-desc">${person.description}</div>
      `;
      wantedList.appendChild(card);
    });
  }

  searchInput.addEventListener('input', e => {
    renderList(e.target.value.trim());
  });

  // 初期表示
  renderList();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>動画再生</title>
<style>
  video {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    background: black;
  }
</style>
</head>
<body>
  <video
    autoplay
    muted
    playsinline
    controlsList="nodownload nofullscreen noremoteplayback"
    disablePictureInPicture
    oncontextmenu="return false;"
  >
    <source src="https://drive.google.com/uc?export=download&id=1-7f4NlYfBnEKK239EZvItrP1v31rZXtB" type="video/mp4" />
    お使いのブラウザは動画タグに対応していません。
  </video>
</body>
</html>

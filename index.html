<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>名鉄LED電光板ランダム更新</title>
<style>
body {
  background-color: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  font-family: 'Courier New', monospace;
}

.led-container {
  width: 90%;
  height: 200px;
  overflow: hidden;
  position: relative;
  border: 3px solid #ff0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background-color: black;
}

.led-line {
  display: flex;
  justify-content: center; /* 上段固定 */
  align-items: center;
  gap: 20px;
  position: relative;
}

.led-type {
  font-size: 3em;
  font-weight: bold;
  padding: 5px 20px;
  border-radius: 2px;
  color: black;
  text-shadow: 0 0 5px #fff, 0 0 10px #fff;
  min-width: 150px;
  text-align: center;
}

.led-destination {
  font-size: 2.5em;
  text-align: center;
  color: #ff0;
  text-shadow: 0 0 5px #ffff80, 0 0 10px #ffff80;
}

.led-announcement {
  font-size: 1.5em;
  margin-top: 10px;
  position: relative;
  white-space: nowrap;
  text-shadow: 0 0 3px #fff;
  color: #fff;
}

button {
  font-size: 1.5em;
  padding: 10px 20px;
  background-color: #222;
  color: #ff0;
  border: 2px solid #ff0;
  cursor: pointer;
  margin: 5px;
}

button:hover {
  background-color: #444;
}
</style>
</head>
<body>

<div class="led-container">
  <div class="led-line">
    <span class="led-type" id="ledType">種別</span>
    <span class="led-destination" id="ledDestination">行き先</span>
  </div>
  <div class="led-announcement" id="ledAnnouncement"></div>
</div>

<button id="updateButton">更新</button>
<button id="voiceButton">音声で送信</button>

<script>
// 表示データ
const displayData = [
  { type: "普通", destination: "名古屋", time: "11:30" },
  { type: "快速", destination: "岐阜", time: "11:35" },
  { type: "急行", destination: "犬山", time: "11:45" },
  { type: "特急", destination: "豊橋", time: "12:00" },
  { type: "臨時", destination: "豊川", time: "11:50" }
];

const speedOrder = ["普通", "快速", "急行", "特急", "臨時"];

const ledType = document.getElementById("ledType");
const ledDestination = document.getElementById("ledDestination");
const ledAnnouncement = document.getElementById("ledAnnouncement");
let scrollInterval;

// アナウンス生成
function generateAnnouncement(train) {
  // 基本アナウンス
  let text = `この電車は、${train.type} ${train.destination}行きです。発車は${train.time}です。`;

  // 種別順リストを追加
  const orderedList = displayData
    .filter(d => speedOrder.includes(d.type))
    .sort((a,b) => speedOrder.indexOf(a.type)-speedOrder.indexOf(b.type))
    .map(d => `${d.type} ${d.destination}`)
    .join(' → ');
  text += ` 種別順: ${orderedList}`;

  return text;
}

// 表示更新（ランダム）
function updateDisplay() {
  const index = Math.floor(Math.random() * displayData.length);
  const current = displayData[index];

  ledType.textContent = current.type;
  ledDestination.textContent = current.destination;
  ledAnnouncement.textContent = generateAnnouncement(current);

  // 横スクロールリセット
  let pos = ledAnnouncement.parentElement.offsetWidth;
  if(scrollInterval) clearInterval(scrollInterval);
  scrollInterval = setInterval(() => {
    pos -= 2;
    if(pos < -ledAnnouncement.scrollWidth){
      pos = ledAnnouncement.parentElement.offsetWidth;
    }
    ledAnnouncement.style.left = pos + 'px';
  }, 30);

  // 自動音声アナウンス
  speakAnnouncement(current);
}

// 音声再生
function speakAnnouncement(train) {
  const utterance = new SpeechSynthesisUtterance(generateAnnouncement(train));
  utterance.lang = 'ja-JP';
  speechSynthesis.speak(utterance);
}

// ボタンイベント
document.getElementById("updateButton").addEventListener('click', updateDisplay);
document.getElementById("voiceButton").addEventListener('click', () => {
  const current = { type: ledType.textContent, destination: ledDestination.textContent, time: displayData.find(d=>d.destination===ledDestination.textContent)?.time || "不明" };
  speakAnnouncement(current);
});

// 初期表示
updateDisplay();
</script>

</body>
</html>

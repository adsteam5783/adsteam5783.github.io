<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>ADS公式 - キャンペーン & 情報部門配信</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: linear-gradient(135deg, #c3dfff, #e7f0ff);
      margin: 0;
      padding: 40px 20px;
      color: #222;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .container {
      background: white;
      max-width: 650px;
      width: 100%;
      border-radius: 16px;
      padding: 40px 30px;
      box-shadow: 0 15px 35px rgba(0, 123, 255, 0.3);
      text-align: center;
    }
    h1 {
      font-weight: 900;
      font-size: 2.8rem;
      color: #007bff;
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
    }
    p {
      font-size: 1.1rem;
      line-height: 1.7;
      margin: 1rem 0 1.5rem;
      color: #444;
    }
    .highlight {
      color: #e63946;
      font-weight: 700;
      font-size: 1.3rem;
      letter-spacing: 0.03em;
    }
    .section {
      margin-top: 50px;
      padding-top: 25px;
      border-top: 2px solid #007bff;
      box-shadow: inset 0 1px 0 #a3c7ff;
    }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #007bff, #0056b3);
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      padding: 14px 36px;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
      box-shadow: 0 6px 12px rgba(0,123,255,0.35);
      text-decoration: none;
      user-select: none;
    }
    .btn:hover {
      background: linear-gradient(135deg, #0056b3, #003f7f);
      transform: scale(1.05);
      box-shadow: 0 9px 18px rgba(0,86,179,0.5);
    }
    h2 {
      font-weight: 700;
      font-size: 1.8rem;
      color: #007bff;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ADS公式</h1>

    <p><span class="highlight">7月19日から夏休み期間終了まで</span><br>新メンバー加入キャンペーンを開催します！</p>
    <p>今なら特典がいっぱい！ぜひこの機会にご参加ください。</p>
    <a href="#" class="btn" role="button">キャンペーン詳細を見る</a>

    <div class="section">
      <h2>情報部門配信 開催中！</h2>
      <p>現在、情報部門による配信も実施中です。<br>
         最新の情報や役立つコンテンツをお届けしています。</p>
      <a href="#" class="btn" role="button">配信詳細を見る</a>
    </div>
  </div>
</body>
</html>

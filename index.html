<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADSチーム - AI活用とプロンプト配布 | Advanced Data Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 15px 0;
            border-bottom: 2px solid rgba(0, 255, 255, 0.3);
            transition: transform 0.3s ease;
        }

        header.scrolled {
            transform: translateY(-100%);
        }

        header.visible {
            transform: translateY(0);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-links a {
            font-family: 'Orbitron', sans-serif;
            color: #ffffff;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .nav-links a:hover {
            color: #00ffff;
            background: rgba(0, 255, 255, 0.1);
            transform: scale(1.05);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: #00ffff;
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* Hamburger Menu */
        .hamburger {
            display: none;
            cursor: pointer;
            z-index: 1001;
        }

        .hamburger div {
            width: 30px;
            height: 3px;
            background: #00ffff;
            margin: 5px;
            transition: all 0.3s ease;
        }

        /* Hero Section */
        .hero {
            margin-top: 80px;
            padding: 120px 0;
            text-align: center;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600"><rect fill="%23162447" width="1200" height="600"/><circle cx="200" cy="150" r="50" fill="%2300ffff" opacity="0.1"/><circle cx="800" cy="300" r="80" fill="%2300ffff" opacity="0.05"/><circle cx="1000" cy="500" r="60" fill="%2300ffff" opacity="0.08"/></svg>');
            background-size: cover;
            position: relative;
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-content h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            margin-bottom: 20px;
            color: #00ffff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }

        .hero-content .subtitle {
            font-size: 1.8rem;
            color: #ffffff;
            margin-bottom: 15px;
            opacity: 0.9;
            animation: fadeIn 2s ease-in-out 0.5s forwards;
            opacity: 0;
        }

        .hero-content .description {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            animation: fadeIn 2s ease-in-out 1s forwards;
            opacity: 0;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(0, 255, 255, 0.5); }
            to { text-shadow: 0 0 30px rgba(0, 255, 255, 0.8); }
        }

        .cta-button {
            background: linear-gradient(45deg, #00ffff, #0080ff);
            color: #ffffff;
            padding: 15px 30px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            position: relative;
            overflow: hidden;
            transform: perspective(1px) translateZ(0);
        }

        .cta-button:hover {
            transform: perspective(1px) translateZ(0) scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 255, 255, 0.4);
        }

        .cta-button.secondary {
            background: transparent;
            border: 2px solid #00ffff;
            color: #00ffff;
        }

        /* AI Solutions Section */
        .ai-solution-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(0, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            transform: translateZ(0);
        }

        .ai-solution-card:hover {
            transform: translateY(-10px) rotateX(5deg) rotateY(5deg);
            box-shadow: 0 20px 40px rgba(0, 255, 255, 0.2);
            border-color: rgba(0, 255, 255, 0.5);
        }

        /* Floating Particles */
        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .floating-element {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00ffff;
            border-radius: 50%;
            opacity: 0.3;
            animation: float 15s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            animation: fadeIn 0.5s ease-in-out;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            margin: 5% auto;
            padding: 40px;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            position: relative;
            animation: slideIn 0.5s ease-in-out;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .hamburger {
                display: block;
            }

            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;
                background: rgba(0, 0, 0, 0.95);
                padding: 20px;
                text-align: center;
            }

            .nav-links.active {
                display: flex;
            }

            .hero-content h1 {
                font-size: 2.5rem;
            }

            .contact-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="floating-elements" id="floating-elements"></div>

    <header>
        <nav class="container">
            <div class="logo">ADS Team</div>
            <div class="hamburger" onclick="toggleMenu()">
                <div></div>
                <div></div>
                <div></div>
            </div>
            <ul class="nav-links">
                <li><a href="#home">ホーム</a></li>
                <li><a href="#ai-solutions">AI活用</a></li>
                <li><a href="#prompts">プロンプト配布</a></li>
                <li><a href="#team">チーム</a></li>
                <li><a href="#stats">実績</a></li>
                <li><a href="#contact">お問い合わせ</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero" id="home">
        <div class="container">
            <div class="hero-content">
                <h1>ADS Team</h1>
                <p class="subtitle">AI活用とプロンプト配布で業務効率化を実現</p>
                <p class="description">
                    ChatGPT、Claude、Geminiなど最新のAIツールを駆使して、企業の業務効率化を支援します。
                    実用的なプロンプトの配布から、カスタムAIソリューションの開発まで、包括的なサポートを提供します。
                </p>
                <div class="cta-buttons">
                    <a href="#ai-solutions" class="cta-button">AI活用事例を見る</a>
                    <a href="#prompts" class="cta-button secondary">プロンプトを入手</a>
                </div>
            </div>
        </div>
    </section>

    <!-- 他のセクション（AI Solutions, Prompt Library, Stats, Team, Contact, Footer）は元のコードをそのまま使用 -->
    <!-- 省略のため、以下に含めないが、元のHTMLの該当セクションをコピーして使用してください -->

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modal-title">ダウンロード</h2>
            <p id="modal-description">選択したプロンプトパックをダウンロードします。詳細はこちらをご覧ください。</p>
            <div class="modal-buttons">
                <a href="#" class="cta-button">ダウンロード開始</a>
                <button class="cta-button secondary" onclick="closeModal()">キャンセル</button>
            </div>
        </div>
    </div>

    <script>
        // Hamburger Menu Toggle
        function toggleMenu() {
            const navLinks = document.querySelector('.nav-links');
            const hamburger = document.querySelector('.hamburger');
            navLinks.classList.toggle('active');
            hamburger.classList.toggle('open');
        }

        // Modal Functionality
        function openModal(type) {
            const modal = document.getElementById('modal');
            const modalTitle = document.getElementById('modal-title');
            const modalDescription = document.getElementById('modal-description');
            
            if (type === 'allPrompts') {
                modalTitle.textContent = '全プロンプトパック';
                modalDescription.textContent = 'すべてのプロンプトパック（PDF形式）をダウンロードします。';
            } else if (type === 'monthlyUpdate') {
                modalTitle.textContent = '今月の新着プロンプト';
                modalDescription.textContent = '最新のプロンプトセットをダウンロードします。';
            }
            modal.style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // Floating Particles
        const floatingContainer = document.getElementById('floating-elements');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.classList.add('floating-element');
            particle.style.left = `${Math.random() * 100}vw`;
            particle.style.animationDelay = `${Math.random() * 15}s`;
            floatingContainer.appendChild(particle);
        }

        // Scroll Animation for Header
        let lastScrollTop = 0;
        window.addEventListener('scroll', () => {
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const header = document.querySelector('header');
            if (scrollTop > lastScrollTop && scrollTop > 100) {
                header.classList.remove('visible');
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
                header.classList.add('visible');
            }
            lastScrollTop = scrollTop;
        });

        // Smooth Scroll
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>
</html>

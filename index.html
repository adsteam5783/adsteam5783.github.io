<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Discord Bot 学習サイト</title>
  <style>
    /* 基本スタイル */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #1e1e1e;
      color: #eee;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden; /* 動画中はスクロール禁止 */
    }
    /* 動画全画面表示 */
    #introVideo {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 1000;
      background-color: black;
    }
    /* メインコンテンツは最初非表示 */
    #mainContent {
      display: none;
      padding: 20px;
      max-width: 900px;
      margin: 30px auto;
      overflow-y: auto;
      height: 100vh;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <!-- 自動再生動画（無音） -->
  <video id="introVideo" autoplay muted playsinline>
    <source src="intro.mp4" type="video/mp4" />
    動画に対応していないブラウザです。
  </video>

  <!-- メインコンテンツ -->
  <div id="mainContent">
    <header>
      <h1>Discord Bot 学習サイト</h1>
      <p>初心者向けのDiscord Bot開発入門とコード例</p>
    </header>

    <nav>
      <button onclick="showSection('intro')">はじめに</button>
      <button onclick="showSection('js')">JavaScript入門</button>
      <button onclick="showSection('python')">Python入門</button>
      <button onclick="showSection('deploy')">デプロイ</button>
      <button onclick="showSection('links')">参考リンク</button>
    </nav>

    <main>
      <section id="intro" style="display:block;">
        <h2>はじめに</h2>
        <p>このサイトは、Discord Botを初めて作る人向けの学習サイトです。基本的なセットアップ方法から、簡単なコード例までわかりやすく説明しています。</p>
        <ul>
          <li>Botアカウントの作成</li>
          <li>開発環境の準備</li>
          <li>簡単なコマンドの作り方</li>
          <li>Botの公開方法</li>
        </ul>
        <p style="color:#ffcc00; font-weight:bold; margin-top: 1em;">
          ※ このサイトは順次更新していきます。最新情報をお楽しみに！
        </p>
      </section>
      <!-- ここに他のセクションも追加してください -->
    </main>

    <footer>
      <small>© 2025 Discord Bot 学習サイト - 学習用テンプレート</small>
    </footer>
  </div>

  <script>
    // 動画が終わったらメインコンテンツを表示、動画は非表示に
    const video = document.getElementById('introVideo');
    const mainContent = document.getElementById('mainContent');

    video.addEventListener('ended', () => {
      video.style.display = 'none';
      mainContent.style.display = 'block';
      document.body.style.overflow = 'auto'; // スクロール許可
    });

    // navボタンでセクション切替（必要なら追加）
    function showSection(id) {
      document.querySelectorAll('main section').forEach(section => {
        section.style.display = section.id === id ? 'block' : 'none';
      });
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEDルーレット＋スクロールアナウンス</title>
<style>
body {
  background-color: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  font-family: 'Courier New', monospace;
  color: #ff0;
}

.led-container {
  width: 80%;
  height: 200px;
  overflow: hidden;
  position: relative;
  border: 2px solid #ff0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  margin-bottom: 20px;
}

.led-line {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  position: relative;
  white-space: nowrap;
}

.led-type {
  font-size: 3em;
  font-weight: bold;
  padding: 5px 20px;
  border-radius: 5px;
  color: black;
  min-width: 150px;
  text-align: center;
}

.led-destination {
  font-size: 2.5em;
  text-align: center;
}

.led-announcement {
  font-size: 1.5em;
  margin-top: 10px;
  position: relative;
  white-space: nowrap;
}

button {
  font-size: 1.5em;
  padding: 10px 20px;
  background-color: #222;
  color: #ff0;
  border: 2px solid #ff0;
  cursor: pointer;
  margin: 5px;
}

button:hover {
  background-color: #444;
}
</style>
</head>
<body>

<div class="led-container">
  <div class="led-line" id="ledLine">
    <span class="led-type" id="ledType">種別</span>
    <span class="led-destination" id="ledDestination">行き先</span>
  </div>
  <div class="led-announcement" id="ledAnnouncement">アナウンス</div>
</div>

<button id="randomButton">ランダム表示</button>
<button id="voiceButton">音声で送信</button>

<script>
const displayData = [
  { type: "普通", destination: "名古屋", color: "#0f0", time: "11:30", stops: ["岐阜"] },
  { type: "快速", destination: "岐阜", color: "#00f", time: "11:35", stops: ["名古屋"] },
  { type: "特急", destination: "豊橋", color: "#f00", time: "11:40", stops: ["名古屋"] },
  { type: "急行", destination: "知多半田", color: "#ffa500", time: "11:45", stops: ["名古屋"] },
  { type: "臨時", destination: "豊川", color: "#ff0", time: "11:50", stops: ["名古屋"] },
  { type: "回送", destination: "大府", color: "#aaa", time: "11:55", stops: [] }
];

const ledType = document.getElementById("ledType");
const ledDestination = document.getElementById("ledDestination");
const ledAnnouncement = document.getElementById("ledAnnouncement");
const ledLine = document.getElementById("ledLine");
const randomButton = document.getElementById("randomButton");
const voiceButton = document.getElementById("voiceButton");

let currentData = displayData[0];
let scrollIntervals = [];

// アナウンス生成
function generateAnnouncement(data) {
  const stopText = data.stops.length > 0 ? `この${data.type}には${data.stops.join('、')}にも止まります。` : "";
  return `${data.destination}駅で${data.type}${data.destination}を待ち合わせます。発車は${data.time}です。${stopText}`;
}

// 音声再生
function speakAnnouncement(data) {
  const utterance = new SpeechSynthesisUtterance(generateAnnouncement(data));
  utterance.lang = 'ja-JP';
  speechSynthesis.speak(utterance);
}

// スクロール開始
function startScroll() {
  // 横スクロールリセット
  clearScrollIntervals();
  
  let posLine = ledLine.parentElement.offsetWidth;
  let posAnn = ledAnnouncement.parentElement.offsetWidth;

  const intervalLine = setInterval(() => {
    posLine -= 2;
    if(posLine < -ledLine.scrollWidth) posLine = ledLine.parentElement.offsetWidth;
    ledLine.style.left = posLine + 'px';
  }, 30);

  const intervalAnn = setInterval(() => {
    posAnn -= 2;
    if(posAnn < -ledAnnouncement.scrollWidth) posAnn = ledAnnouncement.parentElement.offsetWidth;
    ledAnnouncement.style.left = posAnn + 'px';
  }, 30);

  scrollIntervals.push(intervalLine, intervalAnn);
}

function clearScrollIntervals() {
  scrollIntervals.forEach(i => clearInterval(i));
  scrollIntervals = [];
}

// ルーレット表示
function startRoulette() {
  clearScrollIntervals();
  let count = 0;
  const maxCount = 100;
  const intervalTime = 30;

  const interval = setInterval(() => {
    count++;
    const randomIndex = Math.floor(Math.random() * displayData.length);
    const data = displayData[randomIndex];
    currentData = data;

    ledType.textContent = data.type;
    ledType.style.backgroundColor = data.color;
    ledDestination.textContent = data.destination;
    ledAnnouncement.textContent = generateAnnouncement(data);

    const offset = Math.sin(count / 3) * 20;
    ledType.style.transform = `translateY(${offset}px)`;
    ledDestination.style.transform = `translateY(${offset}px)`;
    ledAnnouncement.style.transform = `translateY(${offset}px)`;

    if(count >= maxCount){
      clearInterval(interval);
      ledType.style.transform = 'translateY(0)';
      ledDestination.style.transform = 'translateY(0)';
      ledAnnouncement.style.transform = 'translateY(0)';
      startScroll();
    }
  }, intervalTime);
}

randomButton.addEventListener('click', startRoulette);
voiceButton.addEventListener('click', () => speakAnnouncement(currentData));

// 初期実行
startRoulette();
</script>

</body>
</html>

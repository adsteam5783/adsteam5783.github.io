<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>謝罪文</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            padding: 50px;
            line-height: 1.6;
        }
        .container {
            max-width: 700px;
            margin: auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #d9534f;
            text-align: center;
        }
        p {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>謝罪文</h1>
        <p>このたびは、他鯖配布チャンネルで販売行為を行ってしまい、深くお詫び申し上げます。</p>
        <p>私の行動により、関係者の皆様にご迷惑とご不快な思いをさせてしまったことを重く受け止めております。</p>
        <p>今後はこのようなことが二度と起こらぬよう、注意と改善を徹底いたします。</p>
        <p>改めて、深くお詫び申し上げます。</p>
        <p style="text-align:right;">— 〇〇</p>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>自己紹介サイト - ガフ</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background-color: #f0f0f0;
      text-align: center;
    }
    header {
      background-color: #4a90e2;
      padding: 40px 20px 80px;
      position: relative;
      color: white;
    }
    header img {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid white;
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
    header h1 {
      margin-top: 140px;
      font-size: 2.2rem;
    }
    main {
      max-width: 600px;
      margin: -60px auto 40px;
      background: white;
      padding: 20px 30px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      text-align: left;
    }
    main section {
      margin-bottom: 20px;
    }
    main h2 {
      border-bottom: 2px solid #4a90e2;
      padding-bottom: 6px;
      margin-bottom: 10px;
      color: #333;
    }
  </style>
</head>
<body>

<header>
  <img src="https://media.discordapp.net/attachments/1403312014507507743/1403687636043960342/bb341395-a20b-411b-bde9-6c9e8a50e026.png?ex=6898757b&amp;is=689723fb&amp;hm=27f7f274d841803fb34c4086ff3abbe43a93254082c3c7dad2914d974a161964&amp;=&amp;format=webp&amp;quality=lossless&amp;width=606&amp;height=644" alt="顔写真" />
  <h1>がふ（Gafu）</h1>
</header>

<main>
  <section>
    <h2>自己紹介</h2>
    <p>こんにちは！高校生のガフです。パソコンやプログラミングが好きで、将来はITエンジニアを目指しています。</p>
  </section>
  <section>
    <h2>スキル</h2>
    <ul>
      <li>HTML / CSS / JavaScript</li>
      <li>Python / Java</li>
      <li>サーバー構築やプログラムの仕組みを勉強中</li>
    </ul>
  </section>
</main>

</body>
</html>

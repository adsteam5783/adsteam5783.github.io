<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>自己紹介サイト - ガフ</title>
  <style>
    /* 背景画像を全画面に */
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      /* 好きな背景画像URLに置き換えてください */
      background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
      background-size: cover;
      color: white;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* 半透明の黒いオーバーレイで読みやすく */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: -1;
    }

    header {
      padding: 40px 20px 120px;
      position: relative;
      color: white;
      flex-shrink: 0;
    }
    header img {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid white;
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
    }
    header h1 {
      margin-top: 140px;
      font-size: 2.8rem;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
    }
    main {
      max-width: 600px;
      margin: -80px auto 40px;
      background: rgba(0, 0, 0, 0.5);
      padding: 30px 40px;
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(0,0,0,0.7);
      text-align: left;
      color: #f0f0f0;
      flex-grow: 1;
    }
    main section {
      margin-bottom: 30px;
    }
    main h2 {
      border-bottom: 3px solid #4a90e2;
      padding-bottom: 8px;
      margin-bottom: 15px;
      color: #aaddff;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    }
    main p, main ul {
      font-size: 1.1rem;
      line-height: 1.6;
    }
    main ul li {
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

<header>
  <img src="https://media.discordapp.net/attachments/1403312014507507743/1403687636043960342/bb341395-a20b-411b-bde9-6c9e8a50e026.png?ex=6898757b&amp;is=689723fb&amp;hm=27f7f274d841803fb34c4086ff3abbe43a93254082c3c7dad2914d974a161964&amp;=&amp;format=webp&amp;quality=lossless&amp;width=606&amp;height=644" alt="顔写真" />
  <h1>がふ（Gafu）</h1>
</header>

<main>
  <section>
    <h2>自己紹介</h2>
    <p>こんにちは！高校生のガフです。パソコンやプログラミングが好きで、将来はITエンジニアを目指しています。</p>
  </section>
  <section>
    <h2>スキル</h2>
    <ul>
      <li>HTML / CSS / JavaScript</li>
      <li>Python / Java</li>
      <li>サーバー構築やプログラムの仕組みを勉強中</li>
    </ul>
  </section>
</main>

</body>
</html>

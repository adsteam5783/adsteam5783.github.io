<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>名鉄LED電光板例</title>
<style>
body {
  background-color: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  font-family: 'Courier New', monospace;
}

.led-container {
  width: 90%;
  height: 200px;
  overflow: hidden;
  position: relative;
  border: 3px solid #ff0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background-color: black;
}

.led-line {
  display: flex;
  justify-content: center; /* 上段固定 */
  align-items: center;
  gap: 20px;
  position: relative;
}

.led-type {
  font-size: 3em;
  font-weight: bold;
  padding: 5px 20px;
  border-radius: 2px;
  color: black;
  text-shadow: 0 0 5px #fff, 0 0 10px #fff;
  min-width: 150px;
  text-align: center;
}

.led-destination {
  font-size: 2.5em;
  text-align: center;
  color: #ff0;
  text-shadow: 0 0 5px #ffff80, 0 0 10px #ffff80;
}

.led-announcement {
  font-size: 1.5em;
  margin-top: 10px;
  position: relative;
  white-space: nowrap;
  text-shadow: 0 0 3px #fff;
  color: #fff;
}

button {
  font-size: 1.5em;
  padding: 10px 20px;
  background-color: #222;
  color: #ff0;
  border: 2px solid #ff0;
  cursor: pointer;
  margin: 5px;
}

button:hover {
  background-color: #444;
}
</style>
</head>
<body>

<div class="led-container">
  <div class="led-line">
    <span class="led-type" id="ledType">急行</span>
    <span class="led-destination" id="ledDestination">犬山</span>
  </div>
  <div class="led-announcement" id="ledAnnouncement"></div>
</div>

<button id="voiceButton">音声で送信</button>

<script>
// 表示データ
const displayData = [
  { type: "普通", destination: "名古屋", time: "11:30" },
  { type: "快速", destination: "岐阜", time: "11:35" },
  { type: "急行", destination: "犬山", time: "11:45" },
  { type: "特急", destination: "豊橋", time: "12:00" }
];

// 現在表示
const current = displayData.find(d => d.type === "急行"); // 固定例
const ledAnnouncement = document.getElementById("ledAnnouncement");

// アナウンス生成
function generateAnnouncement(train) {
  return `この電車は、${train.type} ${train.destination}行きです。発車は${train.time}です。`;
}

// スクロール開始
function startScrollAnnouncement() {
  ledAnnouncement.textContent = generateAnnouncement(current);
  let pos = ledAnnouncement.parentElement.offsetWidth;
  setInterval(() => {
    pos -= 2;
    if(pos < -ledAnnouncement.scrollWidth){
      pos = ledAnnouncement.parentElement.offsetWidth;
    }
    ledAnnouncement.style.left = pos + 'px';
  }, 30);

  // 自動音声
  speakAnnouncement(current);
}

// 音声再生
function speakAnnouncement(train) {
  const utterance = new SpeechSynthesisUtterance(generateAnnouncement(train));
  utterance.lang = 'ja-JP';
  speechSynthesis.speak(utterance);
}

// ボタンで任意再生
document.getElementById("voiceButton").addEventListener('click', () => {
  speakAnnouncement(current);
});

// 初回スクロール開始
startScrollAnnouncement();
</script>

</body>
</html>

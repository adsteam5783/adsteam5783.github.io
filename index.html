<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>名鉄LED電光板</title>
<style>
body {
  background-color: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  font-family: 'Courier New', monospace;
}

.led-container {
  width: 90%;
  height: 200px;
  overflow: hidden;
  position: relative;
  border: 3px solid #ff0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background-color: black;
}

.led-line {
  display: flex;
  justify-content: center; /* 上段固定 */
  align-items: center;
  gap: 20px;
  position: relative;
}

.led-type {
  font-size: 3em;
  font-weight: bold;
  padding: 5px 20px;
  border-radius: 2px;
  color: black;
  text-shadow: 0 0 5px #fff, 0 0 10px #fff;
  min-width: 150px;
  text-align: center;
}

.led-destination {
  font-size: 2.5em;
  text-align: center;
  color: #ff0;
  text-shadow: 0 0 5px #ffff80, 0 0 10px #ffff80;
}

.led-announcement {
  font-size: 1.5em;
  margin-top: 10px;
  position: relative;
  white-space: nowrap;
  text-shadow: 0 0 3px #fff;
  color: #fff;
}

button {
  font-size: 1.5em;
  padding: 10px 20px;
  background-color: #222;
  color: #ff0;
  border: 2px solid #ff0;
  cursor: pointer;
  margin: 5px;
}

button:hover {
  background-color: #444;
}
</style>
</head>
<body>

<div class="led-container">
  <div class="led-line">
    <span class="led-type" id="ledType">急行</span>
    <span class="led-destination" id="ledDestination">知多半田</span>
  </div>
  <div class="led-announcement" id="ledAnnouncement"></div>
</div>

<button id="voiceButton">音声で送信</button>

<script>
const displayData = [
  { type: "普通", destination: "名古屋", time: "11:30" },
  { type: "快速", destination: "岐阜", time: "11:35" },
  { type: "急行", destination: "知多半田", time: "11:45" },
  { type: "特急", destination: "豊橋", time: "11:40" },
  { type: "臨時", destination: "豊川", time: "11:50" },
  { type: "回送", destination: "大府", time: "11:55" }
];

const speedOrder = ["普通", "快速", "急行", "特急", "臨時", "回送"];
const ledAnnouncement = document.getElementById("ledAnnouncement");
let scrollInterval;
let currentIndex = 0;

// アナウンス生成
function generateAnnouncement(current) {
  let text = `${current.destination}駅で${current.type}${current.destination}を待ち合わせます。発車は${current.time}です。この${current.type}には名古屋にも止まります。`;
  const orderedList = displayData
    .filter(d => speedOrder.includes(d.type))
    .sort((a,b) => speedOrder.indexOf(a.type)-speedOrder.indexOf(b.type))
    .map(d => `${d.type} ${d.destination}`)
    .join(' → ');
  text += ` 種別順: ${orderedList}`;
  return text;
}

// スクロール開始
function startScrollAnnouncement() {
  clearInterval(scrollInterval);

  const current = displayData.find(d => d.type === "急行"); // 固定表示
  ledAnnouncement.textContent = generateAnnouncement(current);

  let pos = ledAnnouncement.parentElement.offsetWidth;
  scrollInterval = setInterval(() => {
    pos -= 2;
    if(pos < -ledAnnouncement.scrollWidth){
      pos = ledAnnouncement.parentElement.offsetWidth;
    }
    ledAnnouncement.style.left = pos + 'px';
  }, 30);

  // 自動音声アナウンス
  speakAnnouncement(current);
}

// 音声再生
function speakAnnouncement(current) {
  const utterance = new SpeechSynthesisUtterance(generateAnnouncement(current));
  utterance.lang = 'ja-JP';
  speechSynthesis.speak(utterance);
}

document.getElementById("voiceButton").addEventListener('click', () => {
  const current = displayData.find(d => d.type === "急行");
  speakAnnouncement(current);
});

// 初回スクロール開始
startScrollAnnouncement();
</script>

</body>
</html>

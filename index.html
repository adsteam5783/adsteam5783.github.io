<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Discord Bot 学習サイト</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background-color: #1e1e1e;
      color: #eee;
      margin: 0;
      padding: 0;
    }

    /* 動画オーバーレイ */
    #introVideoContainer {
      position: fixed;
      inset: 0;
      background: black;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #introVideo {
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>
<body>
  <!-- 動画オーバーレイ -->
  <div id="introVideoContainer">
    <video id="introVideo" autoplay>
      <source src="intro.mp4" type="video/mp4">
      お使いのブラウザは動画タグに対応していません。
    </video>
  </div>

  <!-- ↓ ここから元のホームページ内容 ↓ -->
  <header>
    <h1>Discord Bot 学習サイト</h1>
    <p>初心者向けのDiscord Bot開発入門とコード例</p>
  </header>

  <nav>
    <button onclick="showSection('intro')">はじめに</button>
    <button onclick="showSection('js')">JavaScript入門</button>
    <button onclick="showSection('python')">Python入門</button>
    <button onclick="showSection('deploy')">デプロイ</button>
    <button onclick="showSection('links')">参考リンク</button>
  </nav>

  <main>
    <section id="intro" style="display:block;">
      <h2>はじめに</h2>
      <p>このサイトは、Discord Botを初めて作る人向けの学習サイトです。</p>
    </section>

    <section id="js" style="display:none;">
      <h2>JavaScript (discord.js) 入門</h2>
      <p>Node.jsとdiscord.jsライブラリを使ったBot作成の基本コード例です。</p>
    </section>
  </main>

  <footer>
    <small>© 2025 Discord Bot 学習サイト</small>
  </footer>

  <script>
    // セクション切り替え
    function showSection(id) {
      document.querySelectorAll('main section').forEach(section => {
        section.style.display = section.id === id ? 'block' : 'none';
      });
    }

    // 動画が終わったらホームページを表示
    const video = document.getElementById('introVideo');
    const container = document.getElementById('introVideoContainer');
    video.addEventListener('ended', () => {
      container.style.display = 'none';
    });

    // ユーザーが途中でスキップできるようクリックで終了
    container.addEventListener('click', () => {
      video.pause();
      container.style.display = 'none';
    });
  </script>
</body>
</html>
